<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Who — LEC Colchester 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:16px}
h1{font-size:18px;font-weight:500;margin-bottom:2px}
.sub{font-size:13px;color:#666;margin-bottom:14px}
.stats{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:6px 14px;text-align:center;min-width:70px}
.stat .n{font-size:20px;font-weight:500}
.stat .l{font-size:11px;color:#888}
.timer{font-size:13px;color:#888;margin-bottom:14px}
.timer span{font-weight:500;color:#1a1a18}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.card{background:#fff;border:0.5px solid #ddd;border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:background .15s,border-color .15s;position:relative;min-height:78px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;user-select:none;-webkit-tap-highlight-color:transparent}
.card:hover{border-color:#aaa}
.card.found{background:#e8f5ee;border-color:#5bab7a}
.card.found .clue{color:#2d7a4f}
.card.found .name{color:#2d7a4f;font-weight:500}
.card.found::after{content:'✓';position:absolute;top:4px;right:7px;font-size:11px;color:#2d7a4f}
.clue{font-size:11px;color:#1a1a18;line-height:1.35;font-weight:500}
.name{font-size:10px;color:#888;min-height:13px;margin-top:2px}
.diff{font-size:9px;padding:1px 4px;border-radius:3px;position:absolute;top:4px;left:5px;font-weight:500}
.d1{background:#e8f5ee;color:#2d7a4f}
.d2{background:#fef3e2;color:#b06c00}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#fff;border-radius:14px;padding:20px;max-width:320px;width:100%;text-align:center}
.modal h3{font-size:15px;font-weight:500;margin-bottom:6px}
.modal p{font-size:12px;color:#666;margin-bottom:12px;line-height:1.5}
.modal .hint-box{background:#f5f4f0;border-radius:8px;padding:8px 12px;font-size:12px;color:#444;margin-bottom:12px;text-align:left;line-height:1.5}
.modal input{width:100%;padding:8px 12px;font-size:14px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18;margin-bottom:10px}
.modal input:focus{outline:none;border-color:#888}
.btn-row{display:flex;gap:8px;justify-content:center}
button{padding:8px 18px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:transparent;color:#1a1a18;cursor:pointer;font-family:inherit}
button:hover{background:#f0f0ee}
button.primary{background:#1a1a18;color:#fff;border-color:transparent}
button.primary:hover{opacity:.85}
.bingo-banner{background:#e8f5ee;border:0.5px solid #5bab7a;border-radius:10px;padding:12px 16px;text-align:center;font-weight:500;font-size:15px;color:#2d7a4f;margin-bottom:12px;display:none}
.btn-row-main{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tip{font-size:11px;color:#aaa;margin-top:10px;line-height:1.5}
.found-unfound{font-size:11px;color:#888;margin-top:2px}

@media print{
  body{background:#fff;padding:0}
  .btn-row-main,.tip,.modal-bg{display:none!important}
  .grid{gap:5px}
  .card{min-height:60px;padding:6px}
  .clue{font-size:10px}
}
</style>
</head>
<body>
<h1>Find someone who… 🎯</h1>
<p class="sub">Ask in English — write their name in the square. First full row = BINGO!</p>

<div class="stats">
  <div class="stat"><div class="n" id="cnt">0</div><div class="l">found</div></div>
  <div class="stat"><div class="n" id="rem">16</div><div class="l">to go</div></div>
  <div class="stat"><div class="n" id="pct">0%</div><div class="l">done</div></div>
</div>
<div class="timer">⏱ Time: <span id="clock">0:00</span> <span id="bingo-time" style="color:#2d7a4f;display:none"></span></div>

<div class="bingo-banner" id="bingo-banner">🎉 BINGO! Show your screen to the teacher!</div>

<div class="grid" id="grid"></div>

<div class="btn-row-main">
  <button class="primary" onclick="shuffleCards()">New game 🔀</button>
  <button onclick="resetAll()">Reset names</button>
</div>
<p class="tip">★ = easier &nbsp;|&nbsp; ★★ = a bit harder &nbsp;|&nbsp; Tap a filled square to undo it.</p>

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <h3 id="modal-q"></h3>
    <div class="hint-box" id="modal-hint"></div>
    <input type="text" id="modal-name" placeholder="Their name…" maxlength="30" autocomplete="off"/>
    <div class="btn-row">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="confirmFound()">Got it ✓</button>
    </div>
  </div>
</div>

<script>
const ALL=[
  {q:"has been to an English-speaking country",h:"<b>Have you ever been to…?</b><br>e.g. England, Ireland, the USA, Australia…",d:2},
  {q:"has a pet at home",h:"<b>Do you have any pets?</b><br>e.g. a dog, a cat, a rabbit…",d:1},
  {q:"can play a musical instrument",h:"<b>Do you play any instruments?</b><br>e.g. the guitar, the piano…",d:1},
  {q:"has watched a series in English",h:"<b>Have you ever watched a series in English?</b><br>e.g. Stranger Things, The Office…",d:2},
  {q:"can name 3 British cities",h:"<b>Can you name three British cities?</b><br>Listen carefully to their answer!",d:2},
  {q:"has never eaten fish and chips",h:"<b>Have you ever eaten fish and chips?</b><br>(If they say no → square is yours!)",d:2},
  {q:"would like to study abroad",h:"<b>Would you like to study in another country?</b><br>Where? Why?",d:2},
  {q:"has a hobby that involves being outdoors",h:"<b>What do you do in your free time?</b><br>e.g. cycling, football, hiking…",d:1},
  {q:"is nervous about speaking English",h:"<b>How do you feel about speaking English?</b><br>Are you nervous / excited / confident?",d:2},
  {q:"has a favourite English word",h:"<b>Do you have a favourite English word?</b><br>What is it? Why?",d:2},
  {q:"has already texted their host family",h:"<b>Have you contacted your host family yet?</b>",d:1},
  {q:"has a birthday in summer",h:"<b>When is your birthday?</b><br>(June, July or August = summer)",d:1},
  {q:"can say something in a 3rd language",h:"<b>Do you speak any other languages?</b><br>Ask them to say something!",d:1},
  {q:"is excited about Cambridge",h:"<b>Are you looking forward to Cambridge?</b><br>What do you want to see there?",d:1},
  {q:"is a left-handed person",h:"<b>Are you left-handed or right-handed?</b>",d:1},
  {q:"is older than you",h:"<b>How old are you?</b><br>(Find someone born before you)",d:1},
  {q:"is younger than you",h:"<b>How old are you?</b><br>(Find someone born after you)",d:1},
  {q:"prefers the countryside to the city",h:"<b>Do you prefer the countryside or the city?</b><br>Ask why!",d:2},
  {q:"has helped someone today",h:"<b>Have you helped anyone today?</b><br>What did you do?",d:2},
  {q:"has never been on a boat",h:"<b>Have you ever been on a boat or a ferry?</b><br>(If they say no → square is yours!)",d:1},
];

let cards=[],active=null,timerID=null,seconds=0,done=false;

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60}

function startTimer(){
  if(timerID)return;
  timerID=setInterval(()=>{
    if(!done){seconds++;document.getElementById('clock').textContent=fmt(seconds);}
  },1000);
}

function pick16(){
  const a=[...ALL];const out=[];
  while(out.length<16){const i=Math.floor(Math.random()*a.length);out.push(a.splice(i,1)[0]);}
  return out;
}

function shuffleCards(){
  clearInterval(timerID);timerID=null;seconds=0;done=false;
  document.getElementById('clock').textContent='0:00';
  document.getElementById('bingo-time').style.display='none';
  cards=pick16().map(c=>({...c,found:false,name:''}));
  render();
}

function render(){
  const g=document.getElementById('grid');g.innerHTML='';
  const found=cards.filter(c=>c.found).length;
  document.getElementById('cnt').textContent=found;
  document.getElementById('rem').textContent=16-found;
  document.getElementById('pct').textContent=Math.round(found/16*100)+'%';
  const banner=document.getElementById('bingo-banner');
  if(found===16&&!done){
    done=true;clearInterval(timerID);
    banner.style.display='block';
    const bt=document.getElementById('bingo-time');
    bt.textContent='🏆 Finished in '+fmt(seconds)+'!';bt.style.display='inline';
  } else if(found<16){banner.style.display='none';}
  cards.forEach((c,i)=>{
    const div=document.createElement('div');
    div.className='card'+(c.found?' found':'');
    div.innerHTML=`<span class="diff d${c.d}">${'★'.repeat(c.d)}</span><span class="clue">${c.q}</span><span class="name">${c.found?c.name:''}</span>`;
    div.onclick=()=>openModal(i);
    g.appendChild(div);
  });
}

function openModal(i){
  if(cards[i].found){cards[i].found=false;cards[i].name='';render();return;}
  startTimer();
  active=i;
  document.getElementById('modal-q').textContent='Find someone who '+cards[i].q;
  document.getElementById('modal-hint').innerHTML=cards[i].h;
  document.getElementById('modal-name').value='';
  document.getElementById('modal').style.display='flex';
  setTimeout(()=>document.getElementById('modal-name').focus(),80);
}

function confirmFound(){
  const n=document.getElementById('modal-name').value.trim();
  if(!n)return;
  cards[active].found=true;cards[active].name=n;
  closeModal();render();
}

function closeModal(){document.getElementById('modal').style.display='none';active=null;}

document.getElementById('modal-name').addEventListener('keydown',e=>{if(e.key==='Enter')confirmFound();});

function resetAll(){cards=cards.map(c=>({...c,found:false,name:''}));done=false;clearInterval(timerID);timerID=null;seconds=0;document.getElementById('clock').textContent='0:00';document.getElementById('bingo-time').style.display='none';render();}

shuffleCards();
</script>
</body>
</html>
